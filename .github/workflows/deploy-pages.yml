# Builds Vite to dist/ and pushes only those files to branch `gh-pages`.
# GitHub Pages must serve that branch (not `main`), otherwise the live site
# will use the repo-root index.html and try to load /src/main.tsx (404).
#
# Repo → Settings → Pages → Build and deployment → Source:
#   "Deploy from a branch" → Branch: gh-pages → Folder: / (root)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
