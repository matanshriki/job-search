# Publishes dist/ via GitHub’s Pages Actions API (Settings → Source: GitHub Actions).
# Do not use the suggested “Jekyll” / “Static HTML” templates — this workflow is enough.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - uses: actions/configure-pages@v5
      - run: npm ci
      - run: npm run build
      - name: Ensure SPA 404 fallback for GitHub Pages
        run: |
          test -f dist/index.html
          cp dist/index.html dist/404.html
          test -s dist/404.html
          ls -la dist/*.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
