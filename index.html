<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="%BASE_URL%favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Local-first personal job search command center" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Instrument+Sans:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Job Search Command Center</title>
    <!-- GitHub Pages: path-only URLs like /job-search/profile 404 unless we jump to hash routing. -->
    <script>
      (function () {
        if (!/\.github\.io$/i.test(location.hostname)) return
        if (location.hash) return
        var base = '/job-search'
        var path = location.pathname.replace(/\/$/, '')
        if (path === base || path === base + '/index.html') return
        if (!path.startsWith(base + '/')) return
        var rest = path.slice(base.length + 1)
        if (!rest) return
        var last = rest.split('/').pop() || ''
        if (/\.[a-zA-Z0-9]{1,10}$/.test(last)) return
        location.replace(location.origin + base + '/#/' + rest)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
